<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <div id="whole">
        <dialog id="my-dialog">
                <form id="my-form" method="dialog">
                    <h3>Title</h3>
                    <p>
                        <input type="text" id="user-title" required autofocus>
                    </p>
                    <h3>Author</h3>
                    <p>
                        <input type="text" id="user-author" required autofocus>
                    </p>
                    <h3>Number of pages</h3>
                    <p>
                        <input type="text" id="user-pages" required autofocus>
                    </p>
                    <h3>Was it read?</h3>
                    <p>
                        <input type="radio" name="user-read" id="user-read-yes" value="yes">
                        <label for="user-read-yes">Yes</label><br>
                        <input type="radio" name="user-read" id="user-read-no" value="no" checked>
                        <label for="user-read-no">No</label><br>
                    </p>
                    <menu>
                    <button type="submit" value="confirm">Confirm</button>
                    </menu>
                </form>
            </dialog>
        <div id="header">
            <div id="title">THE ODIN PROJECT LIBRARY</div>
        </div>
        <div id="collection">
            
        </div>
        <div id="buttons">
            <button id="new-book">Create New Book</button>
            <button id="iterate">See Library</button>
        </div>
        <div id="footer"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
